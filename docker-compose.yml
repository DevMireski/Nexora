version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexora_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - nexora_net
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: nexora_nginx
    ports:
      - '8081:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - nexora_net

  db:
    image: mysql:8.0
    container_name: nexora_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexora
      MYSQL_USER: nexus
      MYSQL_PASSWORD: secret
    ports:
      - '3307:3306'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - nexora_net

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    ports:
      - '6379:6379'
    networks:
      - nexora_net

volumes:
  dbdata:

networks:
  nexora_net:
    driver: bridge
